name: ClickUp API Testing - CT (Scheduled)

on:
  schedule:
    # Corre todos los días a las 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Permite ejecución manual desde la UI de GitHub

jobs:
  continuous-testing:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del Código
      uses: actions/checkout@v4

    - name: Configurar Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"

    - name: Instalar Dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar Suite Completa de Regresión
      env:
        CLICKUP_API_URL: https://api.clickup.com/api/v2
        CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
        ENV: ct
      run: |
        pytest -m "regression or functional or smoke" --html=reports/html/ct-report.html --self-contained-html

    - name: Publicar Resultados Semanales de CT
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ct-scheduled-reports
        path: reports/
        retention-days: 30