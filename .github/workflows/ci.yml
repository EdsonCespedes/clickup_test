name: ClickUp API Testing - CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  quality-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del Código
      uses: actions/checkout@v4

    - name: Configurar Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"
        cache: 'pip'

    - name: Instalar Dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar Linter y Formatter (Ruff)
      run: ruff check .

    - name: Ejecutar Suite de Pruebas en Paralelo (Pytest)
      env:
        CLICKUP_API_URL: https://api.clickup.com/api/v2
        CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
        ENV: ci
      run: |
        pytest -n auto -x

    - name: Guardar Artefactos de Reportes
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ci-execution-reports
        path: |
          reports/html/
          reports/junit/
          reports/coverage/
        retention-days: 14