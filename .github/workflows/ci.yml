name: ClickUp API Testing - CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  quality-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Linter and Formatter (Ruff)
      run: ruff check .

    - name: Run Test Suite (Pytest)
      env:
        CLICKUP_API_URL: https://api.clickup.com/api/v2
        CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
        ENV: ci
      # Limited to 3 workers to respect ClickUp free plan limits
      run: |
        pytest -v -n 3

    - name: Upload Report Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ci-execution-reports
        path: |
          reports/html/
          reports/junit/
          reports/coverage/
        retention-days: 14